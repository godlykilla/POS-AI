<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>POS Terminal</title>
    <link rel="stylesheet" href="style.css">
    <script src="logic-data.js"></script>
    <script src="logic-printer.js"></script>
    <script src="pos-logic.js"></script>
    <style>
        .product-card {
            position: relative;
            background-size: cover;
            background-position: center;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            min-height: 120px;
        }
        .product-card::before {
            content: "";
            position: absolute;
            top:0; left:0; width:100%; height:100%;
            background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 60%);
            z-index: 1;
        }
        .product-card.no-image {
            background: white !important;
            justify-content: center;
        }
        .product-card.no-image::before { display: none; }
        .product-card.no-image h3 { color: var(--sidebar-dark); }
        .product-card.no-image .price-tag { background: var(--accent-blue); color: white; }

        .product-card h3 {
            position: relative;
            z-index: 2;
            margin: 0;
            padding: 0 10px 5px 10px;
            color: white;
            font-size: 0.95rem;
        }
        .product-card .price-tag {
            position: relative;
            z-index: 2;
            margin: 0 10px 10px 10px;
            font-size: 0.8rem;
            color: var(--accent-emerald);
            font-weight: 800;
        }
        
        nav { position: sticky; top: 0; z-index: 1000; }
    </style>
</head>
<body>

<nav>
    <a href="index.html"><span>🏠</span>HUB</a>
    <a href="pos.html"><span>🛒</span>TERMINAL</a>
    <a href="kitchen.html"><span>🍳</span>KITCHEN</a>
    <a href="receipts.html"><span>📄</span>RECEIPTS</a>
    <a href="admin.html"><span>⚙️</span>ADMIN</a>
</nav>

<div class="main-viewport">
    <div id="menu-container">
        <h1 style="font-weight: 900;">Terminal</h1>
        <div id="category-wrapper"></div>
    </div>

    <div id="checkout-panel">
        <div class="cart-items-area" id="cart-list"></div>
        <div class="grand-total-row">
            <span>Total</span>
            <span id="grand-total">EUR 0.00</span>
        </div>
        <button class="btn-action" onclick="openPaymentSimulator()">PROCESS PAYMENT</button>
    </div>
</div>

<div id="mod-modal" class="modal-overlay">
    <div class="modal-content">
        <div id="mod-step" style="font-size: 0.75rem; color: var(--accent-blue); font-weight: 800; margin-bottom: 5px;"></div>
        <h2 id="mod-title" style="margin: 0 0 20px 0;"></h2>
        <div id="mod-options-list"></div>
        <button class="btn-action" style="margin-top:20px;" onclick="nextStep()">CONTINUE</button>
    </div>
</div>

<div id="payment-modal" class="modal-overlay">
    <div class="modal-content" style="text-align:center;">
        <div style="font-size: 3rem; margin-bottom: 20px;">💳</div>
        <h2 id="pay-total-display"></h2>
        <p>Waiting for customer...</p>
        <div style="background: #f0f2f5; height: 10px; border-radius: 5px; overflow: hidden; margin: 20px 0;">
            <div id="pay-progress" style="background: var(--accent-emerald); height: 100%; width: 0%; transition: 1.5s linear;"></div>
        </div>
        <button onclick="closePaymentModal()" style="background:none; border:none; color:gray; cursor:pointer;">Cancel</button>
    </div>
</div>


</body>
</html>
